services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
backend:
  build: ./backend
  ports:
    - "4000:4000"
  depends_on:
    - mongodb
  environment:
    MONGODB_URI: mongodb://mongodb:27017/amazona

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: